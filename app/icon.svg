  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  <!-- Stylized tooth shape — elegant, minimal -->
  <path d="M256 100 C220 100 190 120 180 160 C170 200 175 230 185 260 C195 290 210 340 225 390 C235 420 245 430 256 430 C267 430 277 420 287 390 C302 340 317 290 327 260 C337 230 342 200 332 160 C322 120 292 100 256 100Z"
